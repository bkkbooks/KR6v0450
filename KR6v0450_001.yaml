body:
  text: 清寒比芻雪岑注并序大華嚴法界圖序夫大華嚴華藏法界者以虛空為體以法界為用以遍一切處為佛以緣起法體為衆會說圓滿修多羅教所謂剎說塵說佛說菩薩說三世一時說是也法界圖者以一海印圖圓攝無邊之教海圖中所謂一中一切多即一一即一切多即一是也東土義相法師始製此圖表三世間十法界莊嚴無盡之義以牖冥蒙專門舊學重演流布辨記録鈔遍滿世間誕生王子已為庶人矣原夫華藏之界本無些子限量華嚴之佛亦無些子說法但居無事田地弄他無事活計而已只緣一真淨界俄然晦昧遂有一念分彼分我彼我既立取捨便起才有取捨之心便成十法之界於無事中瞥然生死不動之佛動於無動之際圓融之法㭊於不二之內則衆生之佛依業識以出世佛之衆生昧惠身而取悟轉轉相迷至于今日所謂瞎狗吠蘆叢盲人唱賊虎此大雄不得已而說賢哲不得已而判而大部三十九品小圖二十五句所以出也然言者心之發也心者言之宗也譬如太和之氣本無形聲假形器而激發則為律呂圓融之法本無名相假言句而演說則為經論非律呂無以像太和非經論無以闡圓融則經論者亦是圓融法性之風規而三世諸佛之大意也奈何正法已遠佛教澆漓參佛乘者指教網為葛藤討佛語者斥單傳為壁觀有道理而礙於事者有達事而昧於理者遂使圓融無二之法變為固滯守一之物乃至乾竺分河震旦異宗則平等之慈自相矛盾良可悲夫羅代義相法師製作此圖其來尚矣全家宿德各以教網臆解支離蔓延遂成卷余一覽執卷歎曰清淨法界豈有如此其多言乎若固如是相師豈向微塵偈品中撮其樞要簡出二百一十字莊嚴一乘法界圖乎然以相師一圈觀之向二百一十字究其宗旨則不過法性而已究其法性則不過隨緣而已忽有明眼衲僧出來道說玄說妙說心說性教有明文如何是相法師未吐一字前消息余自代云成化丙申﨟說于緑苔軒南窗下示衆云建法幢立宗旨錦上添華脫籠頭卸角馱太平時節若論頓也不留朕迹千聖亦摸索不著若論漸也返常合道鬧市裏七縱八橫若論圓也箇箇立在轉處全機作用不存軌則若論別也頭頭有殺人之劍處處藏陷虎之機到這裏諸天捧花無路外道潛窺無門終日默而未嘗默終日說而未嘗說毗耶城裏其聲如雷普光殿前有耳如聾只如頓中有漸漸中有頓圓中有別別中有圓圓陀陀阿轆轆地大用現前殺活自由丈六莖章莖草丈六信手拈來無有不是是什麼境界看取新羅義相和尚法界圖一圈向上一路千聖不傳既是不傳底消息祇這法界一圖從何而出只如縱橫屈曲字點斑文是圖耶白紙一幅說玄說黃是圖耶相法師擬心動念垂慈利物是圖耶只如朕兆未萌名器未形早是圖耶良久云領取鉤頭意莫認定盤星大華嚴一乘法界圖東土義相述世尊七處九會為頓機人說頓部已是錯了義相法師向清平世界為什麼鑿空摸影不識好惡說這般間話到這裏安著一字肉上剜瘡減著一字眼中著屑於最清淨法界上且喜沒交涉雖然法本法無法無法法亦法今付無法時法法何曾法伊麼則將山河大地草木叢林一一拈來作一切法亦得將語默動靜縱橫妙用一一覷破作不是法亦得奈為如此我為法王於法自在拈放在我與奪臨時將此一圖作一法界咄法性圓融無二相法者即六根門頭森羅萬像情與無情也性者六根門頭常常受用計較摸索不得底消息也圓融者一切法即一切性一切性即一切法即今青山緑水即是本來性本來性即是青山緑水也無二相者青山緑水本來性元是一箇王太白本來無二也但以世人妄生分別遂有我人於清淨無礙中瞥生異念揑作十法界熾然作用要知不礙底消息麼微塵剎境自他不隔於毫釐十世古今始終不離於當念諸法不動本來寂諸法即前現前一切受用也不動者即前計較摸索不得也本來寂者即前無二相所謂不動絲毫合本然也道箇本然早是動也畢竟如何癡人面前不得說夢無名無相絶一切到這裏非佛非菩薩非二乘非凡夫非法非非法非法性非非法性非緣起非證分可以名目耶可以相知見耶一切攀緣擬議都沒奈何方信道欲言言不及林下好商量證智所知非餘境三世諸佛之所證證此者也歷代禪師之所悟悟此者也自靈峰少室已後代代相承蓮芳續焰者不知其幾何但契此而已境者如上所云絶一切者非商量有分之境也伊麼則這介境與世間境同耶異耶良久云大丈夫秉慧釰般若鋒兮金剛焰非但能摧外道心早曾落却天魔膽咄再犯不容真性甚深極微妙若論大華嚴重重無盡法界不涉唇吻早是說了也不干教乘早已演了也直饒溪聲為舌相山色為身器盡山河大地為寂場惣情非情為衆會言說不著讚揚難盡相師入無縫罅處強生穿鑿所謂彼既無瘡勿傷之也雖然教海波瀾不礙默味相師坐寬蕩蕩地任他道法性圓融無二相諸法不動本來寂無名無相絶一切證智所知非餘境四句道盡了也不搽紅粉便有風流氣象且道四句還有你思量計較分別意識也無自寂場至于今日便是一條鐵無你接觜處相師慈悲之故不惜眉毛有落草之談便道真性甚深極微妙早是十分帶泥帶水去也山僧今日重為注腳葛藤不少前云法性者融淨穢通真俗所謂不可取不可捨若除一切不得全法界之智若添一事不得名清淨之界者也此云真性者別取有情門中證入分退身一步假作真性之名非指法性外別有一段真性也若是藏人竪看有分若是圓頓機中橫看早是錯了也不竪不橫且道是什麼消息橫竪且置一邊作麼生是甚深底道理以謂真也全是夢幻以謂假也純是實相非性非相非真非假而性而相而真而假故云甚深也契文殊之妙智宛是初心則深也不可得入普賢之玄門曾無別體則淺也不可得妙有得之而不有真也不可得真空得之而不空假也不可得理絶名言謂智斷修證故云極微妙還會麼莫謂如來成斷滅一聲還續一聲來不守自性隨緣成一切法本來無性一切性本來無住無住則無體無體則隨緣不礙隨緣不礙故不守自性而成十方三世矣自性者諸法無相本來清淨之體也會麼去年梅今年柳顏色聲香總依舊一中一切多中一所以不守自性隨緣而成故一法無自性故具一切而成一一切法無自性故以一法而成一切是故一中一切多不礙於一一切中一一不礙於多伊麼則一毫端裏三世諸佛處處度生無邊剎海一切衆生箇箇涅槃毫端剎海空花中境界諸佛衆生夢幻中物色譬如虛空雖遍一切而亦不離於一塵要識虛空建立底消息麼依簷山色連雲翠出檻花枝帶露香一即一切多即一所以一中一切多中一故以有一法故即有一切以有一切故即有一法以有衆生故即有諸佛以有諸佛故即有衆生虛空無礙生佛無二緣生無住因果同時無量圓因不出於剎那無邊果海不離於當念要識虛空動作底消息麼竹影掃階塵不動月穿潭底水無痕一微塵中含十方只這一星兒中包含無盡法界無量生佛淨土穢土一一充滿一一周遍無缺無餘伊麼則只這一星兒還有許多限量麼無量法界還有許多伎倆麼咄要大即大要小即小一塵計十方十方為小以十方量一塵一塵為大無緣起故無自性故為甚如此昨夜金烏飛入海曉天依舊一輪飛一切塵中亦如是只這十方法界介介是一微塵一微塵亦不可得如光如影亦如因陀羅網互相參徹重重交映一一寶中衆象無盡一一佛國滿十方十方入一亦無餘非擬議所知非智眼所見何也經行及坐臥常在於其中無量遠劫即一念如前所說微塵十方無有自性體相故一切古今三世諸佛從初發心立普賢願窮未來際不離如今或謦咳一聲或彈指一下乃至揚眉瞬目無不是諸佛方便且道還相委悉麼不離當處常湛然覓則知君不可見一念即是無量劫即今一念亘徹十世橫遍十方建立一切諸佛同時度生行布一切衆生同時滅度非古非今非新非舊且道無量遠劫還有時分也無無影樹下合同船琉璃殿上無知識九世十世互相即一念多劫同時無礙故三世中各具三世而融於平等之世法法常住交徹無礙仍不雜亂隔別成有體則有雜有相則有亂無體則無相故無用為用無用為用故其用不窮建立三世亦在我收攝一念亦在我三世一時一時三世不異古而即新不異新而是古一切亘然古今無間將謂少林消息斷桃花依舊笑春風初發心時便正覺了知真性無生無自性無緣起絶對待如是而發心如是而行李故初發心時圓圓果海已遍了也所謂善財童子不離法界遍歷百城不越初心便登樓閣方信道休論長安好風流得便宜是落便宜生死涅槃常共和若論生死即是普賢境界若論涅槃即是具縛輪回且道涅槃與輪回相去幾何無明實性即佛性幻化空身即法身理事冥然無分別說理說事縱有千般不過甚深真性不守自性而已真性之理妙用恆然真性之事法法常融東林鬱密南嶽嵯峨普賢之境文殊面目攀蘿登頂挈瓶採蓮文殊之智普賢妙用緣起時的的無性無性處常常緣起還相委悉麼一地具是一切地非色非心非行業十佛普賢大人境要見大人境界麼適有人從天台來却從南嶽去能仁海印三昧中於真性中顯理顯事縱有多端推其自性了不可得則佛與衆生乃真性中之光影無佛可成無生可度但一真性而已如閻浮海中所有閻浮山河大地草木叢林推其實體了不可得則山河色相乃大海之光影無性可見無相可取惟一大海而已十佛內證只如是耳翻出如意不思議海印定中所起之法如何形狀非性非相非理非事非佛非衆生非真非假而所說之教即性即相即理即事即佛即衆生即真即假一音演暢而隨類各異隨類各異而圓攝一音以衆生種種心說衆生種種性非識情所到非思量所及故云如意不思議會麼夜靜水寒魚不食滿船空載月明歸雨寶益生滿虛空這一介如意寶流出百千如意寶這一海印定光三昧流出百千海印定光三昧然而這海印定光三昧非但十佛大人境界獨證一切衆生各有十佛大人境界海印定光三昧從生至死從旦至暮或嗔或喜或語或默一一各有一一海印一一海印一一流出衆生煩惱海一一煩惱海各具真如法性海無二無雜故其滿虛空益但八字打開兩手分付而已衆生隨器得利益大富家中器器皆金海印定中法法皆真但有大小方圓染淨異耳其所得益不是他法只為大者言大小者言小方者言方圓者言圓染者言染淨者言淨非博小以令大刻方以為圓革染而說淨也會麼山虛風落石樓靜月侵門是故行者還本是故行者還本際際要識本際麼問禪禪是妄求理理非親直饒玄會得也是眼中塵叵息妄想必不得三世諸佛是守尸鬼歷代禪師是博地凡夫直饒佛說菩薩說剎說三世一時說不異㞘沸熱碗鳴聲於向上一著了沒交涉盡大地是業識茫茫無本可據何故但以假名字引導於衆生無緣善巧捉如意以真如性緣起之無緣捉出家中無相之如意是名善巧其善巧本非伎倆所到會麼江上晚來堪畫處漁人披得一蓑歸歸家隨分得資糧歸家活計本無奇特但以本地風光得本來間田地足伊家活計其所謂資糧三十道品即是飢飯渴漿寒附火熱乘凉有什麼消息雖然種瓜得瓜種果得果一乘清淨法界下得種子豈無玄談分速道長因送客處憶得別家時以陀羅尼無盡寶這介寶藏不在佛界不在生界不在淨界不在染界一一圓明一一交映要識總持法界無盡妙寶麼你看十二時中遇聲遇色遇逆遇順方知不從他得莊嚴法界實寶殿因陀羅網影像互參重重無盡不因莊嚴不因修證本來具足本來圓成故云實又云這介實字不得動著動著則禍生窮坐實際中道床深入法性海了無究竟處故云窮把斷要津不通凡聖故云坐無真無妄不屬有為故云實一切凡聖容身無地故云際喚作一物不得動著之謂中三乘五性常常履踐之謂道究竟平常不用安排之謂床雖然恁麼華藏世界離染清淨豈有如此商量若有如此商量爭到今日若無商量十普法界向什麼處出生左手拍一下云佛事門中不捨一法右手拍一下云不見一法即如來還會麼大千沙界海中漚一切聖賢如電拂舊來不動名為佛按台教以六即判圓教佛所謂一切衆生皆有佛性有佛無佛性相常住從淺至深位位不二名佛本圖總髓論比如有人在床入睡夢中回行三十餘馹覺後方知不動在床喻從本法性經三十句還至法性只一不動故云舊來不動佛然說圓說頓以名現佛觸犯當頭不得名為舊來不動佛莫有離教網葛藤碎祖師玄關者麼請道將來如無自道去也說盡山雲海月情依前不會空惆悵法界圖終弘治十五年壬戌二月日龍壽寺開板
